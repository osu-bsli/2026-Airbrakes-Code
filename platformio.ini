[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
board_build.filesystem = littlefs
monitor_filters = log2file
; Speed up Eigen and the Filter significantly
build_unflags = -Os
build_flags = 
    -O2
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -I src/Filters
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/bolderflight/eigen.git

; Ensure LittleFS has enough space for the 2MB test file
board_build.arduino.memory_type = qio_opi 
board_build.f_flash = 80000000L
board_build.f_psram = 80000000L
board_build.flash_mode = qio
board_build.partitions = large_fs.csv